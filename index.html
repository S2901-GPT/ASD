
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autism Deep Dashboard</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">

<div id="root"></div>

<script type="text/babel">

const { useState } = React;

const deepData = {
  overview: {
    title: "التوحد الناطق: تشريح العالم الداخلي والاضطرابات المصاحبة",
    subtitle: "لوحة تحليلية متقدمة تركز على الفجوة بين الشعور الداخلي والمظهر الخارجي"
  },
  innerWorld: [
    {
      trait: "الشلل التنفيذي",
      internal: "أعرف ما يجب فعله لكن لا أستطيع البدء.",
      external: "يُفهم ككسل.",
      neuro: "خلل في الفص الجبهي."
    }
  ]
};

function App() {
  const [activeTab, setActiveTab] = useState('inner');

  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-4">{deepData.overview.title}</h1>

      <button onClick={()=>setActiveTab('inner')} className="bg-indigo-600 text-white px-4 py-2 rounded">
        عرض
      </button>

      {activeTab === 'inner' && (
        <div className="mt-4">
          {deepData.innerWorld.map((item, i)=>(
            <div key={i} className="bg-white p-4 rounded shadow mb-2">
              <h2 className="font-bold">{item.trait}</h2>
              <p>{item.internal}</p>
              <p className="text-red-500">{item.external}</p>
              <p className="text-sm text-gray-500">{item.neuro}</p>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>

</body>
</html>
