<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>التوحد عالي الأداء — شاشة تفاعلية</title>
<style>
:root{
  --bg:#080b14; --panel:rgba(255,255,255,.075); --panel2:rgba(255,255,255,.105);
  --text:#f4f7fb; --muted:#aeb8c7; --line:rgba(255,255,255,.15); --gold:#e7c16b;
  --cyan:#67e8f9; --violet:#c4b5fd; --rose:#fda4af; --green:#86efac;
}
*{box-sizing:border-box}
body{margin:0;font-family:Tahoma,Arial,"Segoe UI",sans-serif;background:
radial-gradient(1200px 800px at 80% -10%, rgba(103,232,249,.18), transparent 55%),
radial-gradient(900px 650px at 10% 10%, rgba(196,181,253,.16), transparent 55%),
linear-gradient(135deg,#06070d,#101827 50%,#070b13);color:var(--text);min-height:100vh}
.header{position:sticky;top:0;z-index:5;padding:22px 26px;background:rgba(8,11,20,.72);backdrop-filter:blur(18px);border-bottom:1px solid var(--line)}
.hero{display:grid;grid-template-columns:1.3fr .7fr;gap:18px;align-items:center;max-width:1400px;margin:auto}
h1{margin:0;font-size:clamp(26px,3vw,48px);letter-spacing:-1px;line-height:1.15}
.subtitle{color:var(--muted);margin:10px 0 0;font-size:15px;line-height:1.8}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.stat b{display:block;font-size:28px;color:var(--gold)} .stat span{color:var(--muted);font-size:12px}
.toolbar{max-width:1400px;margin:18px auto 0;display:grid;grid-template-columns:1fr auto auto;gap:10px}
input,select,button{border:1px solid var(--line);background:rgba(255,255,255,.08);color:var(--text);border-radius:16px;padding:13px 15px;font-size:14px;outline:none}
select option{background:#111827;color:white}
button{cursor:pointer;background:linear-gradient(135deg,rgba(231,193,107,.28),rgba(103,232,249,.16))}
main{max-width:1400px;margin:22px auto;padding:0 26px 50px}
.grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}
.card{position:relative;overflow:hidden;border:1px solid var(--line);background:linear-gradient(180deg,var(--panel2),rgba(255,255,255,.055));border-radius:26px;padding:18px;box-shadow:0 24px 80px rgba(0,0,0,.28);transition:.2s transform,.2s border-color}
.card:hover{transform:translateY(-4px);border-color:rgba(231,193,107,.45)}
.badge{display:inline-flex;align-items:center;gap:8px;padding:7px 10px;border-radius:999px;background:rgba(231,193,107,.12);border:1px solid rgba(231,193,107,.25);color:#ffe7a8;font-size:12px;margin-bottom:10px}
.card h2{font-size:20px;margin:0 0 12px;color:white;line-height:1.45}
.section{border-top:1px solid var(--line);padding-top:12px;margin-top:12px}
.label{font-size:12px;color:var(--gold);margin-bottom:6px;font-weight:bold}
p{margin:0;color:#dbe3ef;line-height:1.95;font-size:14px}
mark{background:rgba(231,193,107,.35);color:white;border-radius:5px;padding:0 3px}
.empty{display:none;text-align:center;padding:60px;border:1px dashed var(--line);border-radius:24px;color:var(--muted)}
.tableView{display:none;overflow:auto;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.06)}
table{width:100%;border-collapse:collapse;min-width:1100px} th,td{padding:14px;border-bottom:1px solid var(--line);vertical-align:top;line-height:1.8} th{position:sticky;top:0;background:#111827;color:var(--gold);z-index:1} td{color:#e5e7eb}
.footer{color:var(--muted);text-align:center;padding:10px 0 30px;font-size:12px}
@media(max-width:1100px){.hero{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr 1fr}}
@media(max-width:720px){.grid{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.stats{grid-template-columns:1fr}main,.header{padding-left:14px;padding-right:14px}}
</style>
</head>
<body>
<header class="header">
  <div class="hero">
    <div>
      <h1>التوحد عالي الأداء: خريطة داخلية عميقة</h1>
      <p class="subtitle">عرض تفاعلي فاخر للمحاور العصبية والنفسية، مع شرح كيف تُعاش داخليًا وكيف تُساء قراءتها خارجيًا.</p>
    </div>
    <div class="stats">
      <div class="stat"><b id="total">69</b><span>محور</span></div>
      <div class="stat"><b id="shown">69</b><span>ظاهر الآن</span></div>
      <div class="stat"><b>4</b><span>أعمدة تحليل</span></div>
    </div>
  </div>
  <div class="toolbar">
    <input id="q" type="search" placeholder="ابحث داخل كل الشرح..." />
    <select id="cat"><option value="all">كل التصنيفات</option></select>
    <button id="toggle">عرض جدولي</button>
  </div>
</header>
<main>
  <div id="cards" class="grid"></div>
  <div id="table" class="tableView"></div>
  <div id="empty" class="empty">لا توجد نتائج مطابقة.</div>
</main>
<div class="footer">ملف HTML مستقل — يعمل بدون إنترنت.</div>
<script>
const DATA = [{"المحور العميق": "فرط التحسس السمعي", "الوصف العصبي/النفسي التفصيلي": "استجابة عصبية مرتفعة للمثيرات الصوتية مع ضعف في ترشيح الضوضاء الخلفية؛ الصوت لا يصل كإشارة واحدة بل كطبقات متداخلة تتنافس على الانتباه، وقد يرفع معدل التوتر الجسدي ويزيد الجهد التنفيذي المطلوب للبقاء هادئًا.", "كيف يُعاش داخليًا": "يُعاش كاختراق جسدي لا كإزعاج بسيط؛ الأصوات العادية مثل المكيف، احتكاك الكراسي، أو تعدد المحادثات قد تصبح مؤلمة أو تستهلك القدرة على التفكير والكلام، فيحتاج الشخص إلى انسحاب أو سماعات أو صمت لاستعادة التنظيم.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كحساسية زائدة، تدلل، رغبة في التحكم بالبيئة، أو رفض للمشاركة، بينما المشكلة الأساسية ليست موقفًا نفسيًا من الآخرين بل عبء عصبي حقيقي في معالجة الصوت.", "_category": "حسي/جسدي"}, {"المحور العميق": "فرط التحسس البصري", "الوصف العصبي/النفسي التفصيلي": "المعالجة البصرية قد تكون عالية الالتقاط للتفاصيل والوميض والتباين والازدحام؛ الإضاءة البيضاء القوية، الشاشات، الأنماط المتكررة، أو الأماكن المزدحمة تفرض حملاً إدراكيًا مستمرًا على الانتباه.", "كيف يُعاش داخليًا": "يُعاش كتشويش داخلي وفقدان للاتزان الذهني؛ العين ترى أكثر مما يستطيع الدماغ تجاهله، فيظهر الصداع، الضيق، بطء الكلام، أو الرغبة في إغلاق العينين والابتعاد عن المكان.", "كيف يُساء فهمه خارجيًا": "يُفسر خارجيًا كقلة تحمل، غرابة في تفضيل الإضاءة الخافتة، أو مبالغة في طلب تعديل بسيط، مع أن التعديل قد يكون شرطًا أساسيًا للتركيز لا رفاهية.", "_category": "معرفي/تنفيذي"}, {"المحور العميق": "الحساسية اللمسية", "الوصف العصبي/النفسي التفصيلي": "اختلاف في استقبال اللمس والضغط والملمس يجعل بعض الأقمشة، العلامات الداخلية للملابس، المصافحة، أو اللمس المفاجئ مثيرات عالية الشدة؛ وقد يرتبط ذلك بتنظيم الجهاز العصبي الذاتي.", "كيف يُعاش داخليًا": "يُعاش اللمس غير المتوقع كتنبيه حاد أو اقتحام للحدود الجسدية؛ قد يشعر الشخص بتوتر، قشعريرة، غضب صامت، أو حاجة لغسل اليدين أو تغيير الملابس حتى لو بدا المحفز عاديًا للآخرين.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كبرود عاطفي، رفض للناس، نظافة مفرطة، أو تكبر، بينما هو غالبًا محاولة لحماية الاستقرار الحسي والجسدي.", "_category": "حسي/جسدي"}, {"المحور العميق": "الحساسية للروائح", "الوصف العصبي/النفسي التفصيلي": "النظام الشمي قد يكون سريع الالتقاط وشديد الارتباط بالذاكرة والانفعال؛ الروائح الخفيفة مثل العطور أو المنظفات قد تُسجل كإشارات قوية يصعب تجاهلها.", "كيف يُعاش داخليًا": "يُعاش المكان كأنه محاصر برائحة واحدة تسيطر على التفكير؛ قد يظهر غثيان، صداع، تشتت، أو رغبة في الخروج فورًا، ليس لأن الشخص يبالغ بل لأن الدماغ لا يخفض شدة المدخل الحسي.", "كيف يُساء فهمه خارجيًا": "يُفهم كتعليق جارح على نظافة الآخرين أو ذوقهم، أو كرفض اجتماعي للمكان، مع أن رد الفعل في أصله حسي وليس حكمًا أخلاقيًا.", "_category": "حسي/جسدي"}, {"المحور العميق": "الحساسية للنكهات والقوام", "الوصف العصبي/النفسي التفصيلي": "المعالجة الفموية الحسية قد تجعل القوام والحرارة والخلط بين الأطعمة عناصر حاسمة؛ قد يكون الاشمئزاز مرتبطًا بالملمس أو التوقع الحسي لا بمفهوم الدلال أو الانتقائية فقط.", "كيف يُعاش داخليًا": "يُعاش الطعام غير المتوقع كتهديد حسي؛ لقمة واحدة ذات قوام مفاجئ قد تسبب نفورًا شديدًا أو غثيانًا، ويصبح تناول الطعام في المناسبات الاجتماعية مصدر قلق لا متعة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كقلة أدب، إهانة للمضيف، انتقائية طفولية، أو عناد، بينما غالبًا هو نمط حسي ثابت يحتاج احترامًا وتدرجًا لا ضغطًا.", "_category": "حسي/جسدي"}, {"المحور العميق": "ضعف الترشيح الحسي", "الوصف العصبي/النفسي التفصيلي": "هناك صعوبة في كبح المدخلات غير المهمة؛ الدماغ يستقبل تفاصيل كثيرة بالتوازي بدل إعطاء أولوية تلقائية للمعلومة المركزية، ما يزيد الحمل على الانتباه والذاكرة العاملة.", "كيف يُعاش داخليًا": "يُعاش اليوم كفيض متواصل: صوت، ضوء، حركة، كلمات، وجوه، تفاصيل؛ كل شيء يطلب معالجة. لذلك قد يتعب الشخص بسرعة حتى في بيئة تبدو عادية وهادئة نسبيًا.", "كيف يُساء فهمه خارجيًا": "يُفهم كشرود، قلة تركيز، بطء، أو عدم اهتمام، بينما الشخص قد يكون مركزًا أكثر من اللازم على كل شيء دفعة واحدة.", "_category": "حسي/جسدي"}, {"المحور العميق": "نقص الإحساس الجسدي الداخلي", "الوصف العصبي/النفسي التفصيلي": "قد توجد صعوبة في قراءة إشارات الجسد الداخلية مثل الجوع، العطش، الألم، الحاجة للراحة، أو امتلاء المثانة؛ وهذا يرتبط بالاستقبال الباطني interoception.", "كيف يُعاش داخليًا": "يُعاش كفجوة بين الجسد والوعي؛ قد ينسى الشخص الأكل أو الشرب ثم ينهار فجأة، أو لا يلاحظ التوتر إلا بعد أن يصل إلى صداع أو نوبة إرهاق.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كإهمال للصحة أو عدم مسؤولية، مع أن المشكلة قد تكون ضعفًا في التقاط الإشارة الجسدية في الوقت المناسب.", "_category": "حسي/جسدي"}, {"المحور العميق": "البحث الحسي المنظم", "الوصف العصبي/النفسي التفصيلي": "بعض الأشخاص يحتاجون مدخلات حسية محددة لتنظيم الجهاز العصبي: ضغط عميق، حركة متكررة، لمس خامات معينة، أو أصوات ثابتة؛ هذه السلوكيات تعمل كآلية ضبط ذاتي.", "كيف يُعاش داخليًا": "يُعاش التحريك، الضغط، أو التكرار كطريقة لاستعادة الاتزان الداخلي؛ ليس هدفه لفت الانتباه بل خفض الفوضى العصبية وإعادة الجسد إلى مستوى يمكن معه التفكير والتواصل.", "كيف يُساء فهمه خارجيًا": "يُرى كتصرف غريب، طفولي، أو مزعج، بينما قد يكون وسيلة تنظيم فعالة تمنع الانهيار أو الانسحاب.", "_category": "حسي/جسدي"}, {"المحور العميق": "الانهيار الحسي", "الوصف العصبي/النفسي التفصيلي": "عندما يتجاوز الحمل الحسي قدرة التنظيم، ينتقل الجهاز العصبي من المعالجة المرنة إلى وضع دفاعي؛ قد تظهر استجابات بكاء، صمت، غضب، خروج مفاجئ، أو توقف في الكلام.", "كيف يُعاش داخليًا": "يُعاش كفقدان مؤقت للسيطرة وليس اختيارًا؛ الشخص قد يعرف أن رد فعله غير مناسب اجتماعيًا لكنه لا يملك في اللحظة قدرة كافية على التهدئة أو الشرح.", "كيف يُساء فهمه خارجيًا": "يُفهم كنوبة غضب، تمثيل، محاولة ابتزاز، أو سوء تربية، بينما هو غالبًا نتيجة تراكم حمل عصبي سبق اللحظة بوقت طويل.", "_category": "حسي/جسدي"}, {"المحور العميق": "الإغلاق أو التجمد العصبي", "الوصف العصبي/النفسي التفصيلي": "بدل الانفجار الخارجي، قد يستجيب الجهاز العصبي بالإغلاق: انخفاض الكلام، بطء الحركة، صعوبة اتخاذ القرار، واحتياج شديد للوقت؛ يشبه استجابة freeze تحت الضغط.", "كيف يُعاش داخليًا": "يُعاش كأن العقل أصبح بطيئًا أو غير متصل؛ الكلمات موجودة لكن الوصول إليها صعب، والطلب البسيط قد يصبح مستحيلًا لأن النظام التنفيذي توقف مؤقتًا.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كعناد، تجاهل، صمت عقابي، أو ضعف شخصية، بينما هو غالبًا عجز لحظي عن إنتاج الاستجابة المطلوبة.", "_category": "حسي/جسدي"}, {"المحور العميق": "التركيز المفرط", "الوصف العصبي/النفسي التفصيلي": "دارات الانتباه والمكافأة قد تثبت بقوة على موضوع أو مهمة ذات معنى؛ يصبح التحويل إلى مهمة أخرى مكلفًا جدًا، خصوصًا إذا كان الاهتمام عميقًا أو بنيويًا.", "كيف يُعاش داخليًا": "يُعاش كدخول في نفق ذهني واضح وممتع؛ الوقت يقل حضوره، والتفاصيل تتوسع، والانقطاع المفاجئ يسبب ارتباكًا أو توترًا لأن الدماغ كان يعمل في مسار عميق.", "كيف يُساء فهمه خارجيًا": "يُفسر كهوس، تجاهل للآخرين، أو عدم توازن، بينما قد يكون مصدر إنتاجية وفهم عميق إذا أُدير بحدود واضحة.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "الاهتمامات الخاصة", "الوصف العصبي/النفسي التفصيلي": "الاهتمام المحدد ليس مجرد هواية؛ غالبًا يمثل نظامًا معرفيًا مستقرًا يمنح التنبؤ والمعنى والمكافأة، وقد يرتبط بذاكرة قوية وقدرة عالية على بناء نماذج داخلية.", "كيف يُعاش داخليًا": "يُعاش الاهتمام الخاص كمنطقة أمان وهوية وكفاءة؛ الحديث عنه يمنح طاقة ووضوحًا، وقد يكون طريقة للتواصل الحقيقي لا للانعزال.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كملل للآخرين، تكرار غير اجتماعي، أو انغلاق، بينما قد يكون قناة معرفة وإبداع وعلاقة إذا احترم الطرف الآخر إيقاع الحديث.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "صعوبة التحول بين المهام", "الوصف العصبي/النفسي التفصيلي": "المرونة المعرفية والتحول التنفيذي قد يتطلبان وقتًا أطول؛ الانتقال ليس ضغط زر بل إعادة تهيئة كاملة للسياق، الأهداف، القواعد، والطاقة الذهنية.", "كيف يُعاش داخليًا": "يُعاش الانتقال المفاجئ كاقتلاع من مسار داخلي؛ حتى تغيير بسيط في الخطة قد يسبب توترًا لأن الدماغ يحتاج ترتيبًا جديدًا قبل أن يستطيع الأداء.", "كيف يُساء فهمه خارجيًا": "يُفهم ككسل، بطء، مقاومة للتعليمات، أو حب للسيطرة، بينما المشكلة غالبًا في تكلفة التحويل لا في رفض المهمة.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "ضعف البدء التنفيذي", "الوصف العصبي/النفسي التفصيلي": "قد يعرف الشخص ما يجب فعله ويمتلك القدرة عليه، لكنه يواجه عجزًا في إطلاق الفعل بسبب خلل في التخطيط، ترتيب الخطوات، تقدير البداية، أو كبح المشتتات.", "كيف يُعاش داخليًا": "يُعاش كوقوف أمام باب مغلق: النية موجودة، والذنب موجود، لكن الحركة لا تبدأ. هذا يولد إحباطًا شديدًا لأن الخارج يرى عدم إنجاز فقط بينما الداخل مليء بالمحاولة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كإهمال، مماطلة، قلة مسؤولية، أو عدم رغبة، رغم أن الدعم المناسب يكون بتقسيم البداية وتوضيح الخطوة الأولى لا باللوم.", "_category": "حسي/جسدي"}, {"المحور العميق": "ضعف إنهاء المهام", "الوصف العصبي/النفسي التفصيلي": "الإنهاء يتطلب تقييمًا لما يكفي، إغلاق التفاصيل، وتحمل النقص؛ لدى بعض الأشخاص يستمر البحث عن الكمال أو التفصيل لأن معيار الاكتمال غير واضح داخليًا.", "كيف يُعاش داخليًا": "يُعاش كصعوبة في معرفة متى يكون العمل كافيًا؛ كل جزء يفتح جزءًا آخر، فيطول الوقت ويظهر الإرهاق قبل الوصول إلى تسليم نهائي.", "كيف يُساء فهمه خارجيًا": "يُفهم كوسواس، بطء، أو سوء إدارة وقت، بينما قد يحتاج الشخص معيارًا خارجيًا واضحًا للإنجاز وحدًا زمنيًا محددًا.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "الذاكرة العاملة تحت الضغط", "الوصف العصبي/النفسي التفصيلي": "قد تنخفض القدرة على الاحتفاظ بالمعلومات المؤقتة عند وجود ضغط اجتماعي أو حسي؛ السؤال المفاجئ أو تعدد التعليمات يستهلك الذاكرة العاملة بسرعة.", "كيف يُعاش داخليًا": "يُعاش كفراغ لحظي؛ يسمع الشخص الكلام لكنه لا يستطيع الاحتفاظ بكل أجزائه، وقد يحتاج كتابة، تكرارًا، أو وقتًا قبل الرد.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كعدم استماع، غباء، أو تهرب، بينما الأداء قد يكون ممتازًا إذا قُدمت التعليمات مكتوبة أو خطوة بخطوة.", "_category": "حسي/جسدي"}, {"المحور العميق": "التفكير التفصيلي", "الوصف العصبي/النفسي التفصيلي": "يميل الدماغ إلى معالجة المكونات الدقيقة والأنماط المحلية قبل الصورة العامة؛ هذا يمنح دقة عالية لكنه قد يؤخر الوصول إلى الخلاصة العامة في بيئات سريعة.", "كيف يُعاش داخليًا": "يُعاش كالتزام داخلي بالدقة؛ التفاصيل ليست هامشية بل تحمل معنى، وتجاهلها قد يبدو كقبول بخطأ أو غموض غير محتمل.", "كيف يُساء فهمه خارجيًا": "يُفهم كتدقيق مزعج، تعقيد، أو تضييع وقت، بينما قد يكون مصدر جودة عالية واكتشاف أخطاء لا يراها الآخرون.", "_category": "معرفي/تنفيذي"}, {"المحور العميق": "التفكير النظامي", "الوصف العصبي/النفسي التفصيلي": "الميل إلى بناء قواعد ونماذج وعلاقات سببية لفهم الواقع؛ يقل الاعتماد على الحدس الاجتماعي العام ويزداد الاعتماد على البنية والمنطق والاتساق.", "كيف يُعاش داخليًا": "يُعاش العالم كمجموعة أنظمة قابلة للفهم إذا عُرفت قواعدها؛ الغموض غير المفسر يسبب قلقًا، والاتساق يمنح طمأنينة كبيرة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كجمود، فلسفة زائدة، أو رفض للمرونة، مع أن الشخص يحاول إيجاد خريطة معرفية تمنع الفوضى.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "الحاجة إلى الوضوح", "الوصف العصبي/النفسي التفصيلي": "ضعف تحمل الغموض قد يرتبط بارتفاع كلفة التنبؤ؛ التعليمات المفتوحة أو الكلام غير المحدد تترك احتمالات كثيرة يجب تحليلها، ما يزيد القلق والبطء.", "كيف يُعاش داخليًا": "يُعاش الغموض كمساحة تهديد: ما المطلوب بالضبط؟ ما المعيار؟ ما المدة؟ ما الأولوية؟ من دون إجابات، يستهلك العقل طاقته في الاحتمالات بدل التنفيذ.", "كيف يُساء فهمه خارجيًا": "يُفهم ككثرة أسئلة، عدم استقلالية، أو تعقيد، بينما الأسئلة غالبًا محاولة لتحويل الغموض إلى عمل قابل للتنفيذ.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "الحرفية اللغوية", "الوصف العصبي/النفسي التفصيلي": "المعالجة اللغوية قد تعطي أولوية للمعنى المباشر قبل المجاز والسياق الضمني؛ النكتة، التلميح، أو السخرية قد تحتاج معالجة إضافية.", "كيف يُعاش داخليًا": "يُعاش الكلام كعقد دقيق؛ ما قيل هو ما فُهم أولًا. عندما يكتشف الشخص أن المقصود مختلف قد يشعر بالإحراج أو الخداع أو الحاجة لإعادة تفسير كامل للموقف.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كسذاجة، قلة ذكاء اجتماعي، أو تعمد الإحراج، بينما هو اختلاف في أولوية المعالجة بين الحرفي والضمني.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "فهم التلميحات", "الوصف العصبي/النفسي التفصيلي": "التلميحات تعتمد على قراءة سياق اجتماعي غير مصرح به؛ لدى التوحد عالي الأداء قد تكون هذه القراءة واعية وبطيئة لا تلقائية، خصوصًا مع التعب أو القلق.", "كيف يُعاش داخليًا": "يُعاش التلميح كرسالة ناقصة؛ الشخص قد يشعر أن الآخرين يطلبون منه حل لغز اجتماعي بدل قول المطلوب مباشرة، مما يخلق توترًا وخوفًا من الخطأ.", "كيف يُساء فهمه خارجيًا": "يُفهم كقلة ذوق أو تجاهل متعمد، بينما الشخص ربما لم يستقبل الطلب أصلًا لأنه لم يُقل بوضوح.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "قراءة تعابير الوجه", "الوصف العصبي/النفسي التفصيلي": "فك شفرة الوجه يتطلب دمج العينين والفم والسياق ونبرة الصوت؛ قد يكون الدمج أبطأ أو أقل تلقائية، خاصة عندما تكون التعابير دقيقة أو متناقضة.", "كيف يُعاش داخليًا": "يُعاش التفاعل كتحليل مستمر: هل هذا غضب أم تعب؟ هل الابتسامة مجاملة أم قبول؟ هذا التحليل يستهلك طاقة ويؤخر الاستجابة الطبيعية.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كبرود، عدم تعاطف، أو قلة انتباه، بينما قد يكون الشخص مهتمًا جدًا لكنه لا يلتقط الإشارة بالسرعة المتوقعة.", "_category": "حسي/جسدي"}, {"المحور العميق": "نبرة الصوت", "الوصف العصبي/النفسي التفصيلي": "النبرة تحمل معلومات اجتماعية دقيقة عن المزاج والقصد؛ الاختلاف في معالجتها قد يجعل الكلام المحايد يبدو غامضًا، أو يجعل نبرة الشخص نفسه غير مطابقة لما يشعر به.", "كيف يُعاش داخليًا": "يُعاش الموقف كعدم يقين: الكلمات جيدة لكن النبرة ربما لا. وقد يتهم الشخص بأنه غاضب أو ساخر رغم أنه يتكلم بوضوح محايد فقط.", "كيف يُساء فهمه خارجيًا": "يُفهم كفظاظة، جفاف، تكبر، أو عدوانية، بينما النبرة قد لا تعكس الحالة الداخلية بدقة.", "_category": "حسي/جسدي"}, {"المحور العميق": "التواصل البصري", "الوصف العصبي/النفسي التفصيلي": "النظر في العين قد يستهلك موارد انتباه عالية أو يسبب فرط تنبيه؛ بعض الأشخاص يستطيعون التواصل البصري بالتدريب لكنه يبقى مكلفًا ويقلل فهم الكلام.", "كيف يُعاش داخليًا": "يُعاش النظر المباشر كتشويش أو ضغط؛ عندما يركز الشخص على العينين قد يفقد جزءًا من محتوى الكلام، لذلك قد يفهم أفضل عندما ينظر جانبًا.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه ككذب، عدم احترام، ضعف ثقة، أو تهرب، بينما تجنب العين قد يكون استراتيجية لتحسين الفهم لا لإخفاء شيء.", "_category": "حسي/جسدي"}, {"المحور العميق": "تزامن الحوار", "الوصف العصبي/النفسي التفصيلي": "الحوار يتطلب توقيتًا دقيقًا للدخول والخروج، قراءة الوقفات، تقدير طول الرد، وموازنة الدور؛ هذه العمليات قد لا تكون تلقائية بالكامل.", "كيف يُعاش داخليًا": "يُعاش الحديث كمهمة متعددة القنوات؛ الشخص يحاول فهم المحتوى، اختيار الرد، مراقبة النبرة، وعدم المقاطعة في الوقت نفسه، مما يزيد احتمال تأخر الرد أو المقاطعة غير المقصودة.", "كيف يُساء فهمه خارجيًا": "يُفهم كقلة أدب، استحواذ على الحديث، أو عدم اهتمام، بينما المشكلة قد تكون في توقيت الدور لا في احترام الطرف الآخر.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التواصل المباشر", "الوصف العصبي/النفسي التفصيلي": "يميل الشخص إلى تقليل الغموض والتجمل اللفظي، فيعطي معلومة دقيقة وصريحة؛ المقصود غالبًا نقل الحقيقة لا إيذاء المتلقي.", "كيف يُعاش داخليًا": "يُعاش الصدق كمسؤولية معرفية وأخلاقية؛ الالتفاف حول الحقيقة قد يبدو مربكًا أو غير نزيه، لذلك قد يختار الشخص العبارة الأدق حتى لو كانت اجتماعيًا ثقيلة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كوقاحة، قسوة، أو تعمد الإحراج، مع أن النية قد تكون الوضوح لا العدوان.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التعاطف المختلف", "الوصف العصبي/النفسي التفصيلي": "قد يكون التعاطف الشعوري قويًا لكن التعبير عنه غير نمطي؛ الصعوبة غالبًا في إظهار الاستجابة المتوقعة اجتماعيًا لا في غياب الإحساس بالآخر.", "كيف يُعاش داخليًا": "يُعاش ألم الآخرين بعمق أحيانًا، لكن الشخص لا يعرف العبارة المناسبة أو يخاف أن يقول شيئًا خطأ، فيصمت أو يقدم حلًا عمليًا بدل مواساة لفظية.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كبرود أو أنانية، بينما قد يكون الداخل ممتلئًا بالتأثر مع عجز في ترجمته اجتماعيًا.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "نظرية العقل الواعية", "الوصف العصبي/النفسي التفصيلي": "استنتاج نوايا ومعتقدات الآخرين قد يحدث عبر تحليل منطقي واعٍ بدل حدس سريع؛ هذا يجعل الأداء جيدًا في المواقف المتوقعة وأضعف في المواقف الجديدة أو المزدحمة.", "كيف يُعاش داخليًا": "يُعاش كل موقف اجتماعي كمسألة احتمالات: ماذا يقصد؟ لماذا قال ذلك؟ هل يجب أن أرد الآن؟ هذا يخلق إرهاقًا حتى لو بدت المحادثة سهلة للآخرين.", "كيف يُساء فهمه خارجيًا": "يُفهم كتحليل زائد، شك، أو غرابة، بينما الشخص يعوض غياب التلقائية ببناء نموذج عقلي للموقف.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "الإجهاد الاجتماعي", "الوصف العصبي/النفسي التفصيلي": "التفاعل الاجتماعي قد يتطلب مراقبة مستمرة للوجه، النبرة، المسافة، التوقيت، والرد المناسب؛ لذلك يكون مكلفًا حتى عندما يكون الشخص اجتماعيًا أو محبًا للناس.", "كيف يُعاش داخليًا": "يُعاش اللقاء الجيد نفسه كاستنزاف؛ قد يستمتع الشخص ثم يحتاج ساعات أو أيامًا من العزلة ليستعيد قدرته على الكلام والتنظيم.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه ككره للناس، مزاجية، أو انقطاع غير مبرر، بينما هو احتياج تعافٍ بعد حمل اجتماعي مرتفع.", "_category": "حسي/جسدي"}, {"المحور العميق": "القناع الاجتماعي", "الوصف العصبي/النفسي التفصيلي": "التمويه أو masking هو استخدام استراتيجيات واعية أو شبه واعية لإخفاء السمات التوحدية: تقليد تعابير، إجبار التواصل البصري، حفظ نصوص اجتماعية، أو كبت الحركات التنظيمية.", "كيف يُعاش داخليًا": "يُعاش كتمثيل طويل المدى ينجح خارجيًا لكنه يستهلك الهوية والطاقة؛ الشخص قد يبدو طبيعيًا ثم ينهار وحده لأن كل تفاعل كان يتطلب ضبطًا مستمرًا.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه بأنه لا يعاني أو بأنه يختلق الصعوبة لاحقًا، لأن الخارج رأى أداءً مقبولًا ولم يرَ التكلفة العصبية والنفسية لذلك الأداء.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "فقدان الهوية بسبب القناع", "الوصف العصبي/النفسي التفصيلي": "الاستخدام المزمن للتمويه قد يضعف معرفة الشخص بما يريده فعليًا مقابل ما تعلّم أنه مقبول اجتماعيًا؛ يتداخل الأداء الاجتماعي مع الإحساس بالذات.", "كيف يُعاش داخليًا": "يُعاش كغربة عن النفس: هل هذه شخصيتي أم نسخة صنعتها للنجاة؟ قد يشعر الشخص بالإرهاق والفراغ بعد سنوات من تعديل كل حركة وكلمة.", "كيف يُساء فهمه خارجيًا": "يُفهم كتقلب شخصية، حساسية، أو دراما نفسية، بينما قد يكون نتيجة ضغط تكيفي طويل وغير مرئي.", "_category": "حسي/جسدي"}, {"المحور العميق": "الاحتراق التوحدي", "الوصف العصبي/النفسي التفصيلي": "حالة استنزاف مزمنة تنتج من تراكم الحمل الحسي والاجتماعي والتنفيذي، خصوصًا مع masking طويل؛ قد يظهر انخفاض حاد في الوظائف اليومية واللغة والطاقة.", "كيف يُعاش داخليًا": "يُعاش كفقدان قدرة كان يملكها الشخص سابقًا: الردود تصبح أصعب، الاستحمام أو العمل أو الرسائل تتحول إلى جبال، والراحة العادية لا تكفي للتعافي.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه ككسل مفاجئ، اكتئاب فقط، فشل انضباط، أو تراجع بلا سبب، بينما يحتاج خفض مطالب حقيقي واستعادة تدريجية لا ضغطًا إضافيًا.", "_category": "حسي/جسدي"}, {"المحور العميق": "القلق التنبؤي", "الوصف العصبي/النفسي التفصيلي": "عدم القدرة على توقع ما سيحدث يرفع نشاط أنظمة التهديد؛ لذلك تصبح المواقف الجديدة أو المفتوحة مصدر قلق حتى إن لم تكن خطرة موضوعيًا.", "كيف يُعاش داخليًا": "يُعاش المستقبل القريب كسلسلة احتمالات مرهقة: ماذا سيحدث؟ من سيكون هناك؟ ماذا أقول؟ أين أخرج إذا تعبت؟ التحضير يقلل القلق لأنه يقلل المجهول.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كتشاؤم، سيطرة، أو خوف غير منطقي، بينما طلب التفاصيل قد يكون أداة تنظيم وليس رفضًا للتجربة.", "_category": "حسي/جسدي"}, {"المحور العميق": "الروتين كتنظيم", "الوصف العصبي/النفسي التفصيلي": "الروتين يوفر تنبؤًا يقلل العبء التنفيذي والحسي؛ ليس مجرد عادة بل بنية خارجية تساعد الدماغ على توفير الطاقة للمهام غير المتوقعة.", "كيف يُعاش داخليًا": "يُعاش الروتين كأرض ثابتة؛ عندما تكون البداية والنهاية والخطوات معروفة، يستطيع الشخص استخدام طاقته في الأداء بدل فهم ما يجب فعله كل مرة.", "كيف يُساء فهمه خارجيًا": "يُفهم كجمود أو مقاومة للتغيير، بينما الروتين قد يكون دعامة وظيفية تمنع الانهيار وتزيد الاستقلالية.", "_category": "حسي/جسدي"}, {"المحور العميق": "الانزعاج من التغيير المفاجئ", "الوصف العصبي/النفسي التفصيلي": "التغيير غير المتوقع يفرض إعادة حساب للخطة والحواس والتوقعات؛ هذا يمكن أن يفعّل استجابة تهديد حتى لو كان التغيير صغيرًا ظاهريًا.", "كيف يُعاش داخليًا": "يُعاش كارتباك داخلي سريع: الخطة التي كانت تنظم اليوم انهارت، ويحتاج العقل وقتًا لبناء خريطة جديدة. رد الفعل ليس دائمًا متناسبًا مع حجم التغيير الخارجي لأنه مرتبط بحجم إعادة التنظيم الداخلي.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كعناد، دلال، أو رغبة في فرض الرأي، بينما الاستجابة غالبًا نتيجة فقدان التنبؤ لا رفض الأشخاص.", "_category": "روتيني/تنبؤي"}, {"المحور العميق": "العدالة والاتساق", "الوصف العصبي/النفسي التفصيلي": "الحس العالي بالاتساق قد يجعل الشخص شديد الانتباه للتناقض بين القواعد والتطبيق؛ الدماغ النظامي يتعامل مع الاستثناء غير المفسر كخلل يحتاج تصحيحًا.", "كيف يُعاش داخليًا": "يُعاش الظلم أو التناقض كتوتر معرفي وأخلاقي حاد؛ قد يصعب تجاهله أو مجاملته لأن القاعدة بالنسبة له ليست شكلية بل أساس الثقة.", "كيف يُساء فهمه خارجيًا": "يُفهم كتشدد، جدال، أو عدم مرونة، بينما المطالبة بالاتساق قد تكون محاولة لحماية الوضوح والعدالة.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "الكمالية الوظيفية", "الوصف العصبي/النفسي التفصيلي": "قد تنشأ الكمالية من الحاجة إلى تقليل الخطأ والغموض لا من حب التفوق فقط؛ الخوف من سوء الفهم أو النقد يجعل الشخص يراجع التفاصيل بإفراط.", "كيف يُعاش داخليًا": "يُعاش العمل الناقص كقلق مفتوح؛ التسليم قبل التأكد قد يسبب ضغطًا جسديًا وذهنيًا، فيُفضّل الشخص التأخير على احتمال خطأ غير محسوب.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كتعطيل أو مبالغة في الجودة، بينما يحتاج الشخص معايير قبول واضحة ومخاطر محددة للخطأ.", "_category": "حسي/جسدي"}, {"المحور العميق": "المعالجة البطيئة تحت الضغط", "الوصف العصبي/النفسي التفصيلي": "السرعة الظاهرة قد تنخفض عندما يتطلب الموقف دمج لغة، اجتماع، حس، وقرار؛ البطء هنا ليس نقص فهم بل زيادة عمليات معالجة متزامنة.", "كيف يُعاش داخليًا": "يُعاش السؤال السريع كازدحام داخلي؛ يحتاج الشخص ثواني أو دقائق ليحول الفهم إلى جواب مرتب، والضغط عليه يبطئه أكثر.", "كيف يُساء فهمه خارجيًا": "يُفهم كعدم جاهزية، غباء، أو تهرب، بينما منح وقت صامت قد ينتج إجابة دقيقة وعميقة.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "الذاكرة التفصيلية", "الوصف العصبي/النفسي التفصيلي": "قد تكون الذاكرة قوية للأحداث، الجمل، التواريخ، أو التفاصيل الحسية؛ هذه الذاكرة ترتبط أحيانًا بالمعالجة العميقة للتفاصيل وبالأثر العاطفي للمواقف.", "كيف يُعاش داخليًا": "يُعاش الماضي كملف حاضر بتفاصيله؛ كلمة قيلت قبل سنوات قد تبقى واضحة لأن أثرها لم يُغلق أو لأن نمطها مهم لفهم العلاقات.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كتمسك بالماضي أو عدم تسامح، بينما الذاكرة قد تعمل بدقة عالية ولا تمحو التفاصيل بسهولة.", "_category": "حسي/جسدي"}, {"المحور العميق": "صعوبة النسيان بعد الإساءة", "الوصف العصبي/النفسي التفصيلي": "عندما تحدث إساءة أو خيانة قاعدة، قد يبقى الحدث نشطًا لأن الدماغ يربطه بنمط خطر اجتماعي؛ لا يتعلق الأمر بالحقد فقط بل بمحاولة منع تكرار الأذى.", "كيف يُعاش داخليًا": "يُعاش كحذر دائم تجاه الشخص أو السياق؛ حتى بعد الاعتذار، يحتاج الدماغ أدلة متكررة على الأمان قبل أن يخفف الحماية.", "كيف يُساء فهمه خارجيًا": "يُفهم كقسوة، عناد، أو رفض للتسامح، بينما الأمر غالبًا صعوبة في إعادة بناء التنبؤ والثقة.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "اللغة المكتوبة أفضل من الشفهية", "الوصف العصبي/النفسي التفصيلي": "الكتابة تقلل ضغط التوقيت والنبرة والوجه، وتسمح بترتيب الأفكار ومراجعتها؛ لذلك قد يظهر مستوى الشخص الحقيقي كتابيًا أكثر من المحادثة الفورية.", "كيف يُعاش داخليًا": "يُعاش النص كمساحة آمنة للتحكم بالدقة؛ يستطيع الشخص أن يقول ما يقصده دون مقاطعة أو قراءة إشارات متعددة في الوقت نفسه.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كضعف اجتماعي أو تهرب من المواجهة، بينما الكتابة قد تكون قناة تواصل أكثر عدلًا لقدراته.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "صعوبة المكالمات الهاتفية", "الوصف العصبي/النفسي التفصيلي": "المكالمة تزيل الإشارات البصرية وتبقي ضغط النبرة والتوقيت والرد الفوري؛ كما أن المفاجأة وعدم وجود نص مكتوب يزيدان العبء التنفيذي.", "كيف يُعاش داخليًا": "يُعاش رنين الهاتف كإنذار؛ الشخص لا يعرف سياق الطلب ولا يملك وقتًا لترتيب الرد، فيرتفع التوتر حتى لو كانت المكالمة بسيطة.", "كيف يُساء فهمه خارجيًا": "يُفهم كعدم احترام، تجاهل، أو خوف اجتماعي فقط، بينما قد تكون الرسائل المكتوبة أكثر ملاءمة لطريقة المعالجة.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "صعوبة الاجتماعات المفتوحة", "الوصف العصبي/النفسي التفصيلي": "الاجتماع غير المنظم يجمع ضوضاء اجتماعية، تبدل مواضيع، مقاطعات، ونقص معايير؛ وهذا يضغط المرونة والذاكرة العاملة والتواصل في آن واحد.", "كيف يُعاش داخليًا": "يُعاش كفوضى احتمالات؛ الشخص قد يملك أفكارًا قوية لكنه لا يجد لحظة دخول مناسبة أو يحتاج جدولًا واضحًا قبل أن يشارك بكفاءة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كقلة مبادرة أو ضعف قيادة، بينما التنظيم المسبق قد يكشف كفاءة عالية جدًا.", "_category": "حسي/جسدي"}, {"المحور العميق": "العمل الجماعي غير المهيكل", "الوصف العصبي/النفسي التفصيلي": "التعاون يعتمد على قواعد ضمنية كثيرة: من يقود؟ من يقرر؟ ما الأولوية؟ متى يكفي العمل؟ غياب هذه القواعد يجعل التنسيق مكلفًا جدًا.", "كيف يُعاش داخليًا": "يُعاش الفريق كشبكة توقعات غير مكتوبة؛ الشخص قد يفضل العمل الفردي لأنه أكثر وضوحًا وليس لأنه يرفض التعاون.", "كيف يُساء فهمه خارجيًا": "يُفهم كأنانية، عدم مرونة، أو ضعف روح الفريق، بينما يحتاج الشخص أدوارًا وصلاحيات ومخرجات محددة.", "_category": "روتيني/تنبؤي"}, {"المحور العميق": "الأداء العالي مع التكلفة العالية", "الوصف العصبي/النفسي التفصيلي": "قد يمتلك الشخص ذكاءً أو مهارة عالية تجعل الصعوبات غير مرئية؛ الأداء الخارجي الجيد يخفي الجهد التعويضي الهائل المطلوب للحفاظ عليه.", "كيف يُعاش داخليًا": "يُعاش النجاح كشيء مكلف لا كدليل راحة؛ قد ينجز الشخص كثيرًا ثم يدفع الثمن في النوم، الطاقة، المزاج، أو القدرة على الحياة اليومية.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه بأنه لا يحتاج دعمًا لأنه ناجح، بينما الدعم قد يكون ما يمنع الانهيار ويحافظ على الاستدامة.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "التفاوت بين القدرات", "الوصف العصبي/النفسي التفصيلي": "قد تكون بعض القدرات عالية جدًا وأخرى أساسية صعبة؛ هذا التفاوت غير المتجانس شائع في النماء العصبي ويجعل التوقعات الخارجية غير دقيقة.", "كيف يُعاش داخليًا": "يُعاش كتناقض مؤلم: يستطيع تحليل موضوع معقد لكنه يعجز عن ترتيب موعد أو تنظيف غرفة أو الرد على رسالة. هذا يولد خجلًا لأن الآخرين يقارنون بين القدرات بشكل خطي.", "كيف يُساء فهمه خارجيًا": "يُفهم كاختيار أو كسل: كيف تستطيع هذا ولا تستطيع ذاك؟ بينما القدرات ليست موزعة بالتساوي عبر المجالات.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التعب بعد الاندماج الاجتماعي", "الوصف العصبي/النفسي التفصيلي": "بعد فترة من التكيف والتمويه وضبط الحواس، يحتاج الجهاز العصبي إلى تفريغ واستعادة؛ التأخر في الراحة يزيد احتمال الانهيار أو المرض الجسدي.", "كيف يُعاش داخليًا": "يُعاش كهبوط مفاجئ بعد العودة للبيت؛ قد لا يستطيع الكلام أو تحمل الضوء أو اتخاذ قرارات بسيطة رغم أنه كان متماسكًا أمام الناس.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كتمثيل لأن الشخص كان طبيعيًا قبل قليل، بينما الانهيار يأتي بعد انتهاء القدرة على التحمل لا أثناء الأداء دائمًا.", "_category": "حسي/جسدي"}, {"المحور العميق": "الاستجابة العاطفية المتأخرة", "الوصف العصبي/النفسي التفصيلي": "قد يتأخر إدراك المشاعر لأن الدماغ كان منشغلًا بإدارة الموقف؛ بعد انتهاء الحدث تظهر المشاعر كاملة عندما تتوفر مساحة معالجة آمنة.", "كيف يُعاش داخليًا": "يُعاش كأن الفهم العاطفي يأتي لاحقًا: أثناء الموقف يكون الشخص هادئًا أو منطقيًا، ثم بعد ساعات يشعر بالغضب أو الحزن أو الإرهاق.", "كيف يُساء فهمه خارجيًا": "يُفهم كبرود في اللحظة أو مبالغة لاحقة، بينما التأخر جزء من طريقة المعالجة وليس تناقضًا.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "الألكسيثيميا", "الوصف العصبي/النفسي التفصيلي": "صعوبة في تسمية المشاعر وتمييزها عن الإحساس الجسدي؛ قد يعرف الشخص أنه غير مرتاح لكنه لا يعرف هل هو غضب، خوف، جوع، إرهاق، أو حساسية زائدة.", "كيف يُعاش داخليًا": "يُعاش الداخل كضباب جسدي: ضغط في الصدر، صداع، توتر، أو ثقل، دون اسم واضح. لذلك قد يحتاج وقتًا وأسئلة محددة ليعرف ما يشعر به.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كعدم نضج عاطفي أو رفض للكلام عن المشاعر، بينما المشكلة في التحديد اللفظي والدقيق للحالة الداخلية.", "_category": "حسي/جسدي"}, {"المحور العميق": "شدة الانفعال عند تراكم الضغط", "الوصف العصبي/النفسي التفصيلي": "المشاعر قد لا تظهر تدريجيًا بسبب الكبت أو ضعف قراءة الإشارات الداخلية؛ عندما تصل العتبة، يظهر رد فعل كبير يبدو مفاجئًا للآخرين.", "كيف يُعاش داخليًا": "يُعاش كأنه كان يتحمل كثيرًا بصمت ثم لم يعد يستطيع؛ الانفجار ليس بسبب آخر موقف فقط بل بسبب تراكم طويل من المدخلات والطلبات والإحباط.", "كيف يُساء فهمه خارجيًا": "يُفهم كعدم تناسب أو نوبة مزاجية، بينما السبب الحقيقي سلسلة طويلة غير مرئية سبقت اللحظة.", "_category": "معرفي/تنفيذي"}, {"المحور العميق": "الانسحاب كحماية", "الوصف العصبي/النفسي التفصيلي": "الانسحاب قد يكون استراتيجية تنظيم لتقليل المدخلات وتفادي قول أو فعل غير مضبوط أثناء الحمل العصبي؛ لا يعني بالضرورة رفض العلاقة.", "كيف يُعاش داخليًا": "يُعاش كحاجة إلى إغلاق القنوات لا إلى معاقبة الآخر؛ الصمت والمسافة يسمحان بعودة اللغة والاتزان قبل النقاش.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كبرود، تجاهل، أو عقاب صامت، بينما قد يكون أكثر خيار آمن لمنع التصعيد.", "_category": "حسي/جسدي"}, {"المحور العميق": "الحاجة إلى وقت معالجة", "الوصف العصبي/النفسي التفصيلي": "الاستجابة الجيدة قد تتطلب ترتيب الأفكار وربطها بالسياق واختيار صياغة دقيقة؛ الإجبار على الرد الفوري يخفض جودة التواصل.", "كيف يُعاش داخليًا": "يُعاش الطلب الفوري كضغط يخلط الأفكار؛ عندما يُمنح الشخص وقتًا، غالبًا يقدم ردًا أوضح وأكثر عدلًا مما يستطيع قوله تحت الضغط.", "كيف يُساء فهمه خارجيًا": "يُفهم كتردد أو عدم صدق، بينما البطء قد يكون علامة حرص على الدقة لا ضعفًا.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التعب من القرارات الصغيرة", "الوصف العصبي/النفسي التفصيلي": "كل قرار صغير قد يتطلب تحليل معايير وتوقعات ونتائج؛ ومع ضعف الروتين أو كثرة الخيارات تتراكم كلفة القرار حتى تصبح مرهقة.", "كيف يُعاش داخليًا": "يُعاش اختيار وجبة أو ملابس أو رد قصير كعبء غير متوقع؛ ليست المشكلة في حجم القرار بل في عدد المتغيرات المفتوحة داخله.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كاعتمادية أو عجز مبالغ فيه، بينما تقليل الخيارات أو وضع قواعد مسبقة قد يحسن الأداء فورًا.", "_category": "روتيني/تنبؤي"}, {"المحور العميق": "الاعتماد على النصوص الاجتماعية", "الوصف العصبي/النفسي التفصيلي": "قد يستخدم الشخص عبارات محفوظة وسيناريوهات جاهزة لتجاوز المواقف المتكررة؛ هذه النصوص تعوض نقص التلقائية وتخفض احتمال الخطأ.", "كيف يُعاش داخليًا": "يُعاش النص الجاهز كأداة أمان؛ عندما يخرج الموقف عن السيناريو يشعر الشخص بالارتباك أو يحتاج وقتًا لإعادة بناء الرد.", "كيف يُساء فهمه خارجيًا": "يُفهم كتصنع أو رسمية زائدة أو غرابة، بينما هو أسلوب تعويضي عملي للتواصل.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "الصدق مع صعوبة المجاملة", "الوصف العصبي/النفسي التفصيلي": "المجاملة الاجتماعية تتطلب قول شيء غير دقيق أو ناقص الحقيقة لأجل أثر عاطفي؛ هذا قد يصطدم بالحاجة الداخلية للاتساق والوضوح.", "كيف يُعاش داخليًا": "يُعاش الموقف كصراع بين عدم إيذاء الآخر وعدم قول شيء غير صحيح؛ لذلك قد يصمت الشخص أو يعطي إجابة دقيقة جدًا بدل مجاملة متوقعة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كجفاء أو قسوة، بينما قد يكون الشخص يحاول تجنب الكذب والإساءة في الوقت نفسه.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التعلق بالقواعد المكتوبة", "الوصف العصبي/النفسي التفصيلي": "القواعد الصريحة توفر إطارًا يقلل الغموض ويجعل البيئة قابلة للتوقع؛ عندما تُكسر القاعدة دون تفسير، يشعر الشخص أن النظام كله أصبح غير آمن.", "كيف يُعاش داخليًا": "يُعاش الالتزام بالقواعد كطريقة لفهم المكان والناس؛ الاستثناءات غير المعلنة تسبب ارتباكًا لأنها تعني أن القاعدة ليست قاعدة فعلًا.", "كيف يُساء فهمه خارجيًا": "يُفهم كتشدد أو حب للسيطرة، بينما القاعدة بالنسبة له أداة تنقل اجتماعي لا مجرد تفصيل إداري.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "صعوبة المزاح العدواني", "الوصف العصبي/النفسي التفصيلي": "المزاح الذي يحتوي إهانة أو تهديدًا رمزيًا يتطلب تمييزًا سريعًا بين الشكل والمقصد؛ إذا كان السياق غير آمن، يستقبل الدماغ المعنى الحرفي أولًا.", "كيف يُعاش داخليًا": "يُعاش المزاح القاسي كأذى محتمل؛ حتى لو قيل لاحقًا إنه مزاح، يبقى الأثر لأن الجسد استجاب له كتهديد أو رفض.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كعدم تقبل للمزاح أو حساسية مفرطة، بينما المشكلة في نوع المزاح وغموض حدوده.", "_category": "معرفي/تنفيذي"}, {"المحور العميق": "الحاجة إلى بيئة منخفضة التحفيز", "الوصف العصبي/النفسي التفصيلي": "الأداء المعرفي والاجتماعي يتحسن عندما ينخفض الحمل الحسي؛ البيئة ليست خلفية محايدة بل عامل مباشر في القدرة على التنظيم والانتباه.", "كيف يُعاش داخليًا": "يُعاش المكان الهادئ كاستعادة للقدرة الأصلية؛ قد يصبح الشخص أذكى وألطف وأكثر تواصلًا بمجرد انخفاض الضوء والضوضاء والازدحام.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كطلب خاص أو رفاهية، بينما التهيئة البيئية قد تكون مساوية للنظارة لمن يحتاج تصحيح نظر: ليست امتيازًا بل إتاحة.", "_category": "حسي/جسدي"}, {"المحور العميق": "الحركات التكرارية التنظيمية", "الوصف العصبي/النفسي التفصيلي": "الحركات مثل هز القدم، تحريك الأصابع، اللعب بشيء، أو الضغط على اليدين تساعد في تنظيم الإثارة العصبية والانتباه؛ ليست دائمًا علامة قلق مرضي.", "كيف يُعاش داخليًا": "يُعاش التكرار كإيقاع يثبت الجسد ويمنح العقل قناة تفريغ آمنة؛ منعه قد يزيد التوتر ويقلل التركيز.", "كيف يُساء فهمه خارجيًا": "يُفهم كتوتر، قلة احترام، طفولية، أو عدم جدية، بينما السماح به قد يرفع الأداء والهدوء.", "_category": "عاطفي/تنظيمي"}, {"المحور العميق": "الإدراك العالي للأنماط", "الوصف العصبي/النفسي التفصيلي": "قد توجد قدرة قوية على ملاحظة الأنماط والتناقضات والعلاقات الخفية؛ هذا يرتبط بالمعالجة التفصيلية والنظامية وقد يظهر في التقنية، اللغة، الأرقام، أو السلوك البشري.", "كيف يُعاش داخليًا": "يُعاش كأن الأنماط تقفز إلى الوعي تلقائيًا؛ يرى الشخص رابطًا لا يراه الآخرون، وقد يشعر بالإحباط إذا لم يستطع شرحه بسرعة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كغرابة أو مبالغة في الربط، بينما قد يكون مصدر تحليل مبكر للمخاطر أو الفرص.", "_category": "روتيني/تنبؤي"}, {"المحور العميق": "الحساسية للنقد", "الوصف العصبي/النفسي التفصيلي": "النقد قد يفعّل تاريخًا طويلًا من التصحيح الاجتماعي وسوء الفهم؛ لذلك لا يُستقبل كتعليق منفصل بل كدليل جديد على الفشل في قراءة القواعد.", "كيف يُعاش داخليًا": "يُعاش النقد كضربة لهوية متعبة من المحاولة؛ قد تظهر دفاعية أو صمت لأن الشخص لا يسمع الملاحظة فقط بل كل سياق الإخفاقات السابقة.", "كيف يُساء فهمه خارجيًا": "يُفهم كغرور أو عدم تقبل للتوجيه، بينما يحتاج النقد إلى صياغة محددة، عملية، وخالية من التعميم الشخصي.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التعلم عبر القواعد لا الحدس", "الوصف العصبي/النفسي التفصيلي": "بعض المهارات الاجتماعية أو العملية تُكتسب كقواعد صريحة لا كحدس ضمني؛ لذلك يحتاج الشخص أمثلة واضحة واستثناءات مذكورة بدل توقع أن يلتقطها وحده.", "كيف يُعاش داخليًا": "يُعاش التعلم ككتابة دليل داخلي: في هذا السياق أفعل كذا، إلا إذا حدث كذا. كل استثناء غير مذكور يربك النظام ويحتاج تحديثًا.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كضعف فطنة أو كثرة أسئلة، بينما أسلوب التعلم لديه يعتمد على التصريح بالبنية المخفية.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "التشتت بسبب التفاصيل الاجتماعية", "الوصف العصبي/النفسي التفصيلي": "في المحادثة، قد يراقب الشخص تعبيرات الآخرين ونبراتهم وردودهم بدقة مفرطة، فيفقد جزءًا من المحتوى الأساسي أو يبدو مشتتًا.", "كيف يُعاش داخليًا": "يُعاش اللقاء كمسح مستمر للعلامات: هل ملّوا؟ هل أخطأت؟ هل دوري انتهى؟ هذا يترك طاقة أقل لفهم الموضوع نفسه.", "كيف يُساء فهمه خارجيًا": "يُفهم كشرود أو قلة اهتمام، بينما الشخص قد يكون مهتمًا لكنه مثقل بمراقبة مؤشرات القبول والرفض.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "الاحتياج إلى تعافٍ بعد العمل", "الوصف العصبي/النفسي التفصيلي": "بعد يوم يتضمن ضوءًا وضوضاء وتواصلًا وقرارات، قد تحتاج المنظومة العصبية إلى فترة استعادة أطول من المعتاد؛ دونها تتدهور الوظائف اليومية.", "كيف يُعاش داخليًا": "يُعاش البيت كمكان تفريغ؛ قد لا يستطيع الشخص الحديث أو تحمل طلبات إضافية بعد العمل لأن طاقته التنظيمية استهلكت بالكامل.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كإهمال للأسرة أو كسل بعد الدوام، بينما هو تعافٍ ضروري لاستمرار الأداء في اليوم التالي.", "_category": "حسي/جسدي"}, {"المحور العميق": "الفهم العميق مقابل التعبير المحدود", "الوصف العصبي/النفسي التفصيلي": "قد يكون الفهم الداخلي واسعًا لكن التعبير اللحظي محدودًا بسبب ضغط اللغة، التوقيت، والقلق؛ الفجوة بين المعرفة والكلام قد تكون كبيرة.", "كيف يُعاش داخليًا": "يُعاش كاحتباس للمعنى: يعرف الشخص ما يقصده لكنه لا يستطيع إخراجه بسرعة أو بطريقة اجتماعيًا مناسبة، فيبدو أقل قدرة مما هو عليه.", "كيف يُساء فهمه خارجيًا": "يُفهم كضعف فهم أو عدم امتلاك رأي، بينما قد تظهر جودة التفكير عندما يُسمح بالكتابة أو التحضير.", "_category": "اجتماعي/تواصلي"}, {"المحور العميق": "صعوبة طلب المساعدة", "الوصف العصبي/النفسي التفصيلي": "طلب المساعدة يتطلب تحديد المشكلة، صياغتها، توقع رد الآخر، وتحمل احتمال الرفض أو الحكم؛ هذه خطوات اجتماعية وتنفيذية ثقيلة.", "كيف يُعاش داخليًا": "يُعاش الاحتياج للمساعدة كتعقيد إضافي فوق المشكلة الأصلية؛ قد يفضل الشخص المعاناة بصمت على دخول تفاعل غير متوقع.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كعناد أو استقلالية مفرطة، بينما قد يحتاج قناة واضحة وآمنة لطلب الدعم دون حكم.", "_category": "حسي/جسدي"}, {"المحور العميق": "تأثير البيئة غير المتوقعة", "الوصف العصبي/النفسي التفصيلي": "الأماكن ذات القواعد غير الواضحة أو التغير السريع ترفع العبء التنبؤي؛ يحتاج الشخص إلى معرفة المسار، المكان، الأشخاص، والمدة ليستطيع تنظيم نفسه.", "كيف يُعاش داخليًا": "يُعاش المكان الجديد كخريطة ناقصة؛ كل تفصيل يحتاج اكتشافًا: أين أجلس؟ متى أتكلم؟ كيف أخرج؟ وهذا يجعل التجربة متعبة قبل أن تبدأ.", "كيف يُساء فهمه خارجيًا": "يُفهم كخوف أو صعوبة اندماج، بينما المعلومات المسبقة قد تحول التجربة نفسها إلى شيء قابل للإدارة.", "_category": "حسي/جسدي"}, {"المحور العميق": "الاستقلالية المشروطة بالتهيئة", "الوصف العصبي/النفسي التفصيلي": "قد يبدو الشخص مستقلاً جدًا في بيئة مهيأة وواضحة، ثم يحتاج دعمًا كبيرًا في بيئة فوضوية؛ الاستقلالية هنا تعتمد على توافق البيئة مع طريقة المعالجة.", "كيف يُعاش داخليًا": "يُعاش الأداء كمتغير حسب السياق؛ ليس كل يوم وكل مكان بنفس الصعوبة. عندما تتوفر البنية، يظهر الشخص بكامل قدرته، وعند غيابها ينهار الأداء.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كتلاعب أو انتقائية: لماذا تستطيع هنا ولا تستطيع هناك؟ بينما الفرق الحقيقي في الحمل البيئي والتنفيذي.", "_category": "معرفي/تنفيذي"}, {"المحور العميق": "التوحد عالي الأداء كتسمية مضللة", "الوصف العصبي/النفسي التفصيلي": "مصطلح عالي الأداء لا يعني غياب الإعاقة أو الحاجة للدعم؛ غالبًا يشير إلى قدرة لغوية أو معرفية جيدة، لكنه لا يقيس الألم الحسي أو التكلفة الاجتماعية أو صعوبات الحياة اليومية.", "كيف يُعاش داخليًا": "يُعاش كفخ: الناس يتوقعون أداءً طبيعيًا دائمًا لأن المظهر جيد أو الذكاء واضح، فيضطر الشخص لإثبات معاناته بدل تلقي التسهيلات المناسبة.", "كيف يُساء فهمه خارجيًا": "يُساء فهمه كحالة خفيفة أو مجرد شخصية غريبة، بينما الدعم المطلوب قد يكون حقيقيًا ومهمًا حتى مع النجاح الأكاديمي أو المهني.", "_category": "حسي/جسدي"}];
const headers = ["المحور العميق", "الوصف العصبي/النفسي التفصيلي", "كيف يُعاش داخليًا", "كيف يُساء فهمه خارجيًا"];
let mode = 'cards';
const q = document.getElementById('q'), cat = document.getElementById('cat'), cards = document.getElementById('cards'), tableBox = document.getElementById('table'), empty = document.getElementById('empty'), shown = document.getElementById('shown');
[...new Set(DATA.map(x=>x._category))].sort().forEach(c=>{ const o=document.createElement('option'); o.value=c; o.textContent=c; cat.appendChild(o); });
function esc(s){return String(s??'').replace(/[&<>'"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[m]));}
function hi(s,term){s=esc(s); if(!term) return s; const t=term.replace(/[.*+?^${}()|[\]\]/g,'\$&'); return s.replace(new RegExp(t,'gi'), m=>`<mark>${m}</mark>`);}
function filtered(){const term=q.value.trim().toLowerCase(); return DATA.filter(r=> (cat.value==='all'||r._category===cat.value) && (!term || Object.values(r).join(' ').toLowerCase().includes(term)));}
function render(){const term=q.value.trim(); const arr=filtered(); shown.textContent=arr.length; empty.style.display=arr.length?'none':'block';
 if(mode==='cards'){cards.style.display='grid'; tableBox.style.display='none'; cards.innerHTML=arr.map((r,i)=>`<article class="card"><div class="badge">${esc(r._category)} · #${i+1}</div><h2>${hi(r[headers[0]],term)}</h2><div class="section"><div class="label">الوصف العصبي/النفسي التفصيلي</div><p>${hi(r[headers[1]],term)}</p></div><div class="section"><div class="label">كيف يُعاش داخليًا</div><p>${hi(r[headers[2]],term)}</p></div><div class="section"><div class="label">كيف يُساء فهمه خارجيًا</div><p>${hi(r[headers[3]],term)}</p></div></article>`).join('');}
 else {cards.style.display='none'; tableBox.style.display='block'; tableBox.innerHTML=`<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${arr.map(r=>`<tr>${headers.map(h=>`<td>${hi(r[h],term)}</td>`).join('')}</tr>`).join('')}</tbody></table>`;}
}
document.getElementById('toggle').onclick=()=>{mode=mode==='cards'?'table':'cards'; document.getElementById('toggle').textContent=mode==='cards'?'عرض جدولي':'عرض كبطاقات'; render();};
q.oninput=render; cat.onchange=render; render();
</script>
</body>
