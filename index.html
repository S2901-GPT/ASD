function render(){
let s=document.getElementById("search").value.toLowerCase();
let container=document.getElementById("container");
container.innerHTML="";

let grouped={};
data.forEach(x=>{
if(!grouped[x.category]) grouped[x.category]=[];
if(Object.values(x).join(" ").toLowerCase().includes(s))
grouped[x.category].push(x);
});

for(let cat in grouped){
if(grouped[cat].length===0) continue;

let div=document.createElement("div");
div.className="category";
div.innerHTML="<h2>"+cat+"</h2><div class='grid'></div>";

let grid=div.querySelector(".grid");

grouped[cat].forEach(item=>{
let c=document.createElement("div");
c.className="card";
c.innerText=item.title;
c.onclick=()=>openModal(item);
grid.appendChild(c);
});

container.appendChild(div);
}
}

function openModal(item){
modal.style.display="flex";
m_title.innerText=item.title;
m_desc.innerText=item.desc;
m_internal.innerText=item.internal;
m_external.innerText=item.external;
}

function closeModal(){modal.style.display="none";}

render();

</script>
