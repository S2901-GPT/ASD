function render(){
let s=document.getElementById("search").value.toLowerCase();
let g=document.getElementById("grid");
g.innerHTML="";
data.filter(x=>Object.values(x).join(" ").toLowerCase().includes(s))
.forEach(item=>{
let d=document.createElement("div");
d.className="card";
d.innerHTML="<div class='title'>"+item.title+"</div>";
d.onclick=()=>openModal(item);
g.appendChild(d);
});
}

function openModal(item){
document.getElementById("modal").style.display="flex";
m_title.innerText=item.title;
m_desc.innerText=item.desc;
m_internal.innerText=item.internal;
m_external.innerText=item.external;
}

function closeModal(){document.getElementById("modal").style.display="none";}

render();
</script>
