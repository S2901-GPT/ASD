
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>ASD Interactive Dashboard</title>

<style>
body {
    margin:0;
    font-family: system-ui;
    background:#0f172a;
    color:#e2e8f0;
}

header {
    padding:20px;
    background:#020617;
    display:flex;
    gap:10px;
    align-items:center;
}

input, select {
    padding:10px;
    border-radius:10px;
    border:none;
    background:#1e293b;
    color:white;
}

.container {
    padding:20px;
}

.grid {
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(300px,1fr));
    gap:15px;
}

.card {
    background:#020617;
    padding:15px;
    border-radius:15px;
    cursor:pointer;
    transition:.2s;
}

.card:hover {
    transform:scale(1.03);
    background:#1e293b;
}

.modal {
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.8);
    display:none;
    justify-content:center;
    align-items:center;
}

.modal-content {
    background:#020617;
    padding:20px;
    max-width:800px;
    border-radius:15px;
}

button {
    padding:10px 15px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    cursor:pointer;
}

</style>

</head>

<body>

<header>
<input type="text" id="search" placeholder="بحث..." onkeyup="render()">
<select id="sort" onchange="render()">
<option value="">بدون ترتيب</option>
<option value="asc">ترتيب تصاعدي</option>
<option value="desc">ترتيب تنازلي</option>
</select>
</header>

<div class="container">
<div id="grid" class="grid"></div>
</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<h2 id="m_title"></h2>
<p id="m_desc"></p>
<p id="m_internal"></p>
<p id="m_external"></p>
<br>
<button onclick="closeModal()">إغلاق</button>
</div>
</div>

function render() {
    let search = document.getElementById("search").value.toLowerCase();
    let sort = document.getElementById("sort").value;

    let filtered = data.filter(x =>
        Object.values(x).join(" ").toLowerCase().includes(search)
    );

    if(sort === "asc") filtered.sort((a,b)=>a["المحور العميق"].localeCompare(b["المحور العميق"]));
    if(sort === "desc") filtered.sort((a,b)=>b["المحور العميق"].localeCompare(a["المحور العميق"]));

    let grid = document.getElementById("grid");
    grid.innerHTML = "";

    filtered.forEach(item => {
        let div = document.createElement("div");
        div.className = "card";
        div.innerHTML = "<strong>"+item["المحور العميق"]+"</strong><br><small>اضغط للتفاصيل</small>";
        div.onclick = ()=>openModal(item);
        grid.appendChild(div);
    });
}

function openModal(item) {
    document.getElementById("modal").style.display="flex";
    document.getElementById("m_title").innerText=item["المحور العميق"];
    document.getElementById("m_desc").innerText=item["الوصف العصبي/النفسي التفصيلي"];
    document.getElementById("m_internal").innerText=item["كيف يُعاش داخليًا"];
    document.getElementById("m_external").innerText=item["كيف يُساء فهمه خارجيًا"];
}

function closeModal() {
    document.getElementById("modal").style.display="none";
}

render();

</script>
